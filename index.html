<!doctype html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020617"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="EF COMMAND"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="apple-touch-icon.png"><title>EF COMMAND</title><style>
:root{font-family:system-ui,-apple-system,sans-serif;color:#e5eefb;background:#020617}*{box-sizing:border-box}body{margin:0;background:#020617}button,input,select{font:inherit}.app{min-height:100vh;padding:24px 16px 100px;max-width:900px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav button,.btn{border:0;border-radius:12px;padding:10px 14px;color:white;background:#17233a}.nav button.active,.primary{background:#2563eb}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.card{background:#0a1326;border:1px solid #1a2740;border-radius:18px;padding:18px}.metric span{display:block;color:#8a96aa;font-size:13px}.metric strong{display:block;font-size:26px;margin-top:6px}.form{display:grid;grid-template-columns:2fr 1fr 100px auto;gap:10px;align-items:end}.form label{font-size:13px;color:#a7b2c7}.form input,.form select{width:100%;margin-top:6px;min-height:44px;border:1px solid #2a3852;background:#0d172b;color:white;border-radius:12px;padding:0 12px}.stack{display:grid;gap:10px}.row{display:flex;gap:10px;align-items:center;background:#0a1326;border:1px solid #1a2740;border-radius:14px;padding:12px}.row main{flex:1;min-width:0}.row small{display:block;color:#8290a8;margin-top:3px}.icon{border:0;background:transparent;color:#94a3b8;font-size:18px}.done{text-decoration:line-through;color:#6f7c92}.bottom{position:fixed;left:0;right:0;bottom:0;display:none;justify-content:space-around;padding:8px 4px max(8px,env(safe-area-inset-bottom));background:#050c1af2;border-top:1px solid #1a2740}.bottom button{border:0;background:transparent;color:#8d9ab0;font-size:11px}.timer{position:fixed;inset:0;background:#020617f9;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:20}.timer.show{display:flex}.time{font-size:72px;font-weight:800}.timer-actions{display:flex;gap:12px;margin-top:20px}@media(max-width:750px){.desktop-nav{display:none}.bottom{display:flex}.grid{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.app{padding-top:max(22px,env(safe-area-inset-top))}}
</style></head><body><div class="app"><div class="top"><div><div class="brand">EF COMMAND</div><small id="nameLabel">Schüler</small></div><div class="nav desktop-nav" id="nav"></div></div><div id="content"></div></div><div class="bottom" id="bottom"></div><div class="timer" id="timer"><button class="icon" id="closeTimer" style="position:absolute;top:20px;right:20px;font-size:30px">×</button><small id="timerSubject"></small><h2 id="timerTitle"></h2><div class="time" id="timerValue">25:00</div><div class="timer-actions"><button class="btn" id="pauseTimer">Pause</button><button class="btn primary" id="finishTimer">Beenden</button></div></div><script>
const K='ef-command-flat-v1',uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random();const def={profile:{name:'Schercko',targetAverage:2.5},subjects:[{id:uid(),name:'Mathematik'},{id:uid(),name:'Deutsch'},{id:uid(),name:'Englisch'},{id:uid(),name:'Geschichte'}],tasks:[],exams:[],grades:[],studyMinutes:0};let s=(()=>{try{return {...def,...JSON.parse(localStorage.getItem(K)||'{}')}}catch{return structuredClone(def)}})(),page='heute',active=null,sec=0,total=0,run=false,iv=null;const pages=[['heute','Heute'],['aufgaben','Aufgaben'],['klausuren','Klausuren'],['faecher','Fächer'],['noten','Noten'],['planung','Planung'],['einstellungen','Einstellungen']];const esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function save(){localStorage.setItem(K,JSON.stringify(s))}function set(fn){s=fn(structuredClone(s));save();render()}function nav(){for(const id of ['nav','bottom']){const el=document.getElementById(id);el.innerHTML='';pages.forEach(([k,l],i)=>{if(id==='bottom'&&i>4)return;const b=document.createElement('button');b.textContent=l;b.className=page===k?'active':'';b.onclick=()=>{page=k;render()};el.appendChild(b)})}}function title(a,b){return `<h1>${a}</h1><p style="color:#8793aa">${b}</p>`}function today(){const o=s.tasks.filter(t=>!t.done),d=s.tasks.filter(t=>t.done),n=o[0];return title('Hallo, '+esc(s.profile.name),'Dein Lern-Kommandozentrum')+`<div class="grid">${[['Offene Aufgaben',o.length],['Erledigt',d.length],['Lernzeit',s.studyMinutes+' Min.'],['Ziel-Ø',Number(s.profile.targetAverage).toFixed(1)]].map(x=>`<div class="card metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</div><div class="card">${n?`<small style="color:#60a5fa">NÄCHSTE AKTION</small><h2>${esc(n.title)}</h2><p>${esc(n.subject)} · ${n.minutes} Min.</p><button class="btn primary" id="startNext">Jetzt starten</button>`:`<h2>Alles erledigt</h2><p>Lege eine Aufgabe an.</p><button class="btn primary" id="goTasks">Aufgabe hinzufügen</button>`}</div>`}function tasks(){return title('Aufgaben','Erstellen, starten und abhaken')+`<div class="card form"><label>Aufgabe<input id="taskTitle"></label><label>Fach<select id="taskSubject">${s.subjects.map(x=>`<option>${esc(x.name)}</option>`).join('')}</select></label><label>Minuten<input id="taskMinutes" type="number" value="25" min="5"></label><button class="btn primary" id="addTask">Hinzufügen</button></div><div class="stack">${s.tasks.map(t=>`<div class="row"><button class="icon toggle" data-id="${t.id}">${t.done?'✓':'○'}</button><main><strong class="${t.done?'done':''}">${esc(t.title)}</strong><small>${esc(t.subject)} · ${t.minutes} Min.</small></main>${!t.done?`<button class="icon start" data-id="${t.id}">▶</button>`:''}<button class="icon del" data-id="${t.id}">🗑</button></div>`).join('')}</div>`}function exams(){return title('Klausuren','Termine verwalten')+`<div class="card form"><label>Titel<input id="examTitle"></label><label>Datum<input id="examDate" type="date"></label><button class="btn primary" id="addExam">Hinzufügen</button></div><div class="stack">${s.exams.map(e=>`<div class="row"><main><strong>${esc(e.title)}</strong><small>${e.date}</small></main><button class="icon delexam" data-id="${e.id}">🗑</button></div>`).join('')}</div>`}function subjects(){return title('Fächer','Verwalten')+`<div class="card form"><label>Fach<input id="subjectName"></label><button class="btn primary" id="addSubject">Hinzufügen</button></div><div class="grid">${s.subjects.map(x=>`<div class="card"><strong>${esc(x.name)}</strong><button class="icon delsub" data-id="${x.id}" style="float:right">🗑</button></div>`).join('')}</div>`}function grades(){return title('Noten','Durchschnitt pro Fach')+`<div class="card form"><label>Fach<select id="gradeSubject">${s.subjects.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select></label><label>Note<input id="gradeValue" type="number" min="1" max="6" value="3"></label><button class="btn primary" id="addGrade">Speichern</button></div><div class="grid">${s.subjects.map(x=>{const g=s.grades.filter(y=>y.subjectId===x.id),a=g.length?g.reduce((q,y)=>q+y.grade,0)/g.length:null;return `<div class="card metric"><span>${esc(x.name)}</span><strong>${a?a.toFixed(2).replace('.',','):'–'}</strong><small>${g.length} Noten</small></div>`}).join('')}</div>`}function planning(){const o=s.tasks.filter(t=>!t.done);return title('Planung','Offene Aufgaben in Reihenfolge')+`<div class="stack">${o.map((t,i)=>`<div class="row"><strong style="color:#60a5fa">${16+Math.floor(i/2)}:${i%2?'30':'00'}</strong><main><strong>${esc(t.title)}</strong><small>${esc(t.subject)} · ${t.minutes} Min.</small></main></div>`).join('')}</div>`}function settings(){return title('Einstellungen','Profil und Daten')+`<div class="card form"><label>Name<input id="profileName" value="${esc(s.profile.name)}"></label><label>Ziel-Ø<input id="targetAverage" type="number" step="0.1" value="${s.profile.targetAverage}"></label><button class="btn" id="exportData">Export</button><button class="btn" id="resetData" style="background:#b91c1c">Reset</button></div>`}function render(){nav();document.getElementById('nameLabel').textContent=s.profile.name||'Schüler';document.getElementById('content').innerHTML=page==='heute'?today():page==='aufgaben'?tasks():page==='klausuren'?exams():page==='faecher'?subjects():page==='noten'?grades():page==='planung'?planning():settings();bind()}function bind(){document.getElementById('goTasks')?.addEventListener('click',()=>{page='aufgaben';render()});document.getElementById('startNext')?.addEventListener('click',()=>{const t=s.tasks.find(x=>!x.done);if(t)startTimer(t)});document.getElementById('addTask')?.addEventListener('click',()=>{const title=document.getElementById('taskTitle').value.trim();if(!title)return;const subject=document.getElementById('taskSubject').value,minutes=+document.getElementById('taskMinutes').value||25;set(x=>{x.tasks.push({id:uid(),title,subject,minutes,done:false});return x})});document.querySelectorAll('.toggle').forEach(b=>b.onclick=()=>set(x=>{const t=x.tasks.find(y=>y.id===b.dataset.id);if(t)t.done=!t.done;return x}));document.querySelectorAll('.start').forEach(b=>b.onclick=()=>{const t=s.tasks.find(y=>y.id===b.dataset.id);if(t)startTimer(t)});document.querySelectorAll('.del').forEach(b=>b.onclick=()=>set(x=>{x.tasks=x.tasks.filter(y=>y.id!==b.dataset.id);return x}));document.getElementById('addExam')?.addEventListener('click',()=>{const title=document.getElementById('examTitle').value.trim(),date=document.getElementById('examDate').value;if(!title||!date)return;set(x=>{x.exams.push({id:uid(),title,date});return x})});document.querySelectorAll('.delexam').forEach(b=>b.onclick=()=>set(x=>{x.exams=x.exams.filter(y=>y.id!==b.dataset.id);return x}));document.getElementById('addSubject')?.addEventListener('click',()=>{const name=document.getElementById('subjectName').value.trim();if(!name)return;set(x=>{x.subjects.push({id:uid(),name});return x})});document.querySelectorAll('.delsub').forEach(b=>b.onclick=()=>set(x=>{x.subjects=x.subjects.filter(y=>y.id!==b.dataset.id);return x}));document.getElementById('addGrade')?.addEventListener('click',()=>{const subjectId=document.getElementById('gradeSubject').value,grade=+document.getElementById('gradeValue').value;if(grade<1||grade>6)return;set(x=>{x.grades.push({id:uid(),subjectId,grade});return x})});document.getElementById('profileName')?.addEventListener('change',e=>set(x=>{x.profile.name=e.target.value;return x}));document.getElementById('targetAverage')?.addEventListener('change',e=>set(x=>{x.profile.targetAverage=+e.target.value||2.5;return x}));document.getElementById('exportData')?.addEventListener('click',()=>{const blob=new Blob([JSON.stringify({version:'1.0',data:s},null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='ef-command-backup.json';a.click();URL.revokeObjectURL(u)});document.getElementById('resetData')?.addEventListener('click',()=>{if(confirm('Alles löschen?')){s=structuredClone(def);save();render()}})}function startTimer(t){active=t;total=(t.minutes||25)*60;sec=total;run=true;document.getElementById('timerSubject').textContent=t.subject;document.getElementById('timerTitle').textContent=t.title;document.getElementById('timer').classList.add('show');tick();clearInterval(iv);iv=setInterval(()=>{if(run&&sec>0){sec--;tick()}},1000)}function tick(){document.getElementById('timerValue').textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');document.getElementById('pauseTimer').textContent=run?'Pause':'Weiter'}document.getElementById('pauseTimer').onclick=()=>{run=!run;tick()};document.getElementById('closeTimer').onclick=()=>{clearInterval(iv);document.getElementById('timer').classList.remove('show')};document.getElementById('finishTimer').onclick=()=>{const used=Math.max(1,Math.round((total-sec)/60));set(x=>{x.studyMinutes+=used;const t=x.tasks.find(y=>y.id===active.id);if(t)t.done=true;return x});clearInterval(iv);document.getElementById('timer').classList.remove('show')};if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));render();
</script></body></html>
